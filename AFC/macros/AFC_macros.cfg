# 弹出已加载的通道
[gcode_macro BT_TOOL_UNLOAD]
description: 卸载当前已加载的通道
gcode:
  TOOL_UNLOAD

[gcode_macro BT_CHANGE_TOOL]
description: 切换到新通道，先弹出之前加载的通道，然后加载LANE参数指定的通道。LANE参数为整数，默认为1。例如：`BT_CHANGE_TOOL LANE=2`
gcode:
  {% set lane_num = params.LANE|default(1)|int %}
  {% set stepper = printer['gcode_macro _AFC_GLOBAL_VARS'].stepper_name|string %}
  
  CHANGE_TOOL LANE={stepper ~ lane_num}

[gcode_macro BT_LANE_EJECT]
description: 完全弹出通道中的耗材，以便取出线盘。LANE参数为整数，默认为1。例如：`BT_LANE_EJECT LANE=2`
gcode:
  {% set lane_num = params.LANE|default(1)|int %}
  {% set stepper = printer['gcode_macro _AFC_GLOBAL_VARS'].stepper_name|string %}
  
  LANE_UNLOAD LANE={stepper ~ lane_num}

[gcode_macro BT_LANE_MOVE]
description: 将指定通道的耗材移动指定距离。LANE参数为整数，默认为1。DISTANCE参数为整数，默认为20。距离超过200时使用长加载速度。例如：`BT_LANE_MOVE LANE=2 DISTANCE=100`
gcode:
  {% set lane_num = params.LANE|default(1)|int %}
  {% set dist_str = params.DISTANCE|default('20')|string %}
  {% set stepper = printer['gcode_macro _AFC_GLOBAL_VARS'].stepper_name|string %}

  {% set valid_chars = '0123456789' %}
  {% set is_valid = true %}

  {% if dist_str|length > 0 %}
    {% if dist_str[-1] not in valid_chars %}
      {% set is_valid = false %}
    {% endif %}
  {% else %}
    {% set is_valid = false %}
  {% endif %}

  {% if is_valid %}                                                 # 如果参数有效
    {% set dist = dist_str|float %}                                 # 设置距离变量，将字符串转为浮点数
    LANE_MOVE LANE={stepper ~ lane_num} DISTANCE={dist}            # 调用通道移动命令，传入组合的通道号和距离
  {% else %}                                                        # 否则（参数无效）
    { action_respond_info("错误: 无效的DISTANCE参数: " ~ dist_str) } # 输出错误信息
  {% endif %}


[gcode_macro BT_RESUME]
description: 错误后恢复打印，使用普通恢复也会调用AFC_RESUME
gcode:
    {% if not printer.pause_resume.is_paused %}                    # 如果打印机未处于暂停状态
        RESPOND MSG="打印未暂停，忽略恢复命令"                       # 回复信息：打印未暂停
    {% else %}                                                      # 否则（打印机已暂停）
        AFC_RESUME                                                  # 调用AFC恢复命令
    {% endif %}
  
[gcode_macro BT_PREP]
description: 运行AFC准备序列
gcode:
  PREP

[gcode_macro AFC_DISABLE_SKEW]
gcode:
  {% set gVars = printer['gcode_macro _AFC_GLOBAL_VARS'] %}
  {% set verbose = gVars['verbose']|int %}
  {% set disable_skew = gVars['disable_skew_correction']|default(false)|lower == 'true' %}

  # 如果定义了禁用倾斜校正，则禁用它
  {% if disable_skew %}                                            # 如果禁用倾斜标志为真
    SET_GCODE_VARIABLE MACRO=AFC_ENABLE_SKEW VARIABLE=skew_profile VALUE='"{printer.skew_correction.current_profile_name}"'  # 设置G代码变量，保存当前倾斜配置文件名称到AFC_ENABLE_SKEW宏的skew_profile变量
    {% if verbose > 1 %}                                           # 如果详细程度大于1
      RESPOND TYPE=command MSG='AFC: 正在禁用倾斜校正'              # 回复命令信息
    {% endif %}
      SET_SKEW CLEAR=1
    {% if verbose > 1 %}
      GET_CURRENT_SKEW
    {% endif %}
  {% endif %}

[gcode_macro AFC_ENABLE_SKEW]
variable_skew_profile: "my_skew_profile" # 广泛使用，如Klipper文档所述
gcode:
  {% set gVars = printer['gcode_macro _AFC_GLOBAL_VARS'] %}
  {% set verbose = gVars['verbose']|int %}
  {% set disable_skew = gVars['disable_skew_correction']|default(false)|lower == 'true' %}

  # 如果定义了禁用倾斜校正，则恢复它
  {% if disable_skew %}                                            # 如果禁用倾斜标志为真
    {% if verbose > 1 %}                                           # 如果详细程度大于1
      { action_respond_info("AFC: 正在恢复倾斜校正配置 " ~ skew_profile) }  # 回复信息，显示正在恢复的配置文件
    {% endif %}
      SKEW_PROFILE LOAD={skew_profile}
    {% if verbose > 1 %}
      GET_CURRENT_SKEW
    {% endif %}
  {% endif %}